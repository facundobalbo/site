<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apuntes — Facundo Balbo</title>
  <meta name="description" content="Entradas cortas. Pensamientos, observaciones, cosas que pasaron." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="apuntes">
  <div id="sidebar"></div>

  <div class="mobile-topbar" id="mobile-topbar"></div>

  <main class="main-content" id="main-content">
    <div class="content-wrapper">

      <!-- HEADER -->
      <header class="section-header">
        <span class="eyebrow">ENTRADAS CORTAS</span>
        <h1 class="section-title">Apuntes.</h1>
        <p>Pensamientos, observaciones, cosas que pasaron. Sin título, sin pretensión de artículo.</p>
      </header>

      <!-- ENTRIES — cargado dinámicamente desde /api/apuntes -->
      <div class="apuntes-list" id="apuntes-container">
        <p class="apuntes-loading">Cargando...</p>
      </div>

      <script>
        (function () {
          function renderApunte(apunte) {
            var badge = apunte.etiqueta
              ? `<span class="apunte-badge">${apunte.etiqueta}</span>`
              : '';
            var parrafos = (apunte.contenido || '')
              .split('\n\n')
              .filter(Boolean)
              .map(function (p) { return `<p>${p.replace(/\n/g, '<br>')}</p>`; })
              .join('');

            return `
              <article class="apunte-item">
                <div class="apunte-meta">
                  <span class="apunte-date">${apunte.fecha || ''}</span>${badge}
                </div>
                <div class="apunte-text">${parrafos}</div>
              </article>`;
          }

          fetch('/api/apuntes')
            .then(function (r) { return r.json(); })
            .then(function (data) {
              var container = document.getElementById('apuntes-container');
              if (data.error) {
                container.innerHTML = '<p class="apuntes-error">No se pudieron cargar los apuntes.</p>';
                return;
              }
              if (!data.apuntes || data.apuntes.length === 0) {
                container.innerHTML = '<p class="apuntes-empty">Sin apuntes por el momento.</p>';
                return;
              }
              container.innerHTML = data.apuntes.map(renderApunte).join('');
            })
            .catch(function () {
              document.getElementById('apuntes-container').innerHTML =
                '<p class="apuntes-error">No se pudieron cargar los apuntes.</p>';
            });
        })();
      </script>

    </div>

    <footer>
      <span>© 2025 Facundo Balbo — CONSTRUIDO PARA PERDURAR</span>
    </footer>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
