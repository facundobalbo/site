<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca — Facundo Balbo</title>
  <meta name="description" content="Lo que leí. Filosofía, psicología, ingeniería y la novela ocasional." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.85em' x='15' font-size='90' font-family='Georgia' font-style='italic' fill='%23c8956c'>F</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="biblioteca">
  <div id="sidebar"></div>
  <div class="mobile-topbar" id="mobile-topbar"></div>

  <main class="main-content" id="main-content">
    <div class="content-wrapper">

      <header class="section-header">
        <span class="eyebrow">REGISTRO DE LECTURAS</span>
        <h1 class="section-title">Lo que leí.</h1>
        <p>Filosofía, psicología, ingeniería y la novela ocasional. Va creciendo de a poco.</p>
      </header>

      <!-- FILTRO PRIMARIO: mode-pill (no usa filter-pill para no chocar con main.js) -->
      <div class="filter-bar" id="mode-bar">
        <button class="mode-pill active" data-mode="leidos">LEÍDOS</button>
        <button class="mode-pill" data-mode="leyendo">LEYENDO</button>
        <button class="mode-pill" data-mode="pendientes">PENDIENTES</button>
      </div>

      <!-- FILTRO DE CATEGORÍA: cat-pill -->
      <div class="filter-bar" id="category-bar">
        <button class="cat-pill active" data-filter="all">TODOS</button>
      </div>

      <div class="books-grid" id="libros-container">
        <p class="biblioteca-loading">Cargando...</p>
      </div>

    </div>

    <footer>
      <span>© 2026 — Facundo Balbo</span>
      <span class="footer-meta" id="footer-status"></span>
    </footer>
  </main>

  <!-- BOOK MODAL -->
  <div class="essay-modal-overlay" id="book-modal-overlay">
    <div class="essay-modal">
      <div class="book-modal-rating" id="bm-rating"></div>
      <div class="essay-modal-title" id="bm-title"></div>
      <div class="book-modal-author" id="bm-author"></div>
      <div class="book-modal-category" id="bm-category"></div>
      <div class="essay-modal-body" id="bm-review"></div>
      <button class="essay-modal-close" id="book-modal-close">CERRAR ✕</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    (function () {
      var allLibros    = [];
      var currentMode  = 'leidos';
      var currentFilter = 'all';

      var PALETTE = ['#c8956c', '#4a6a8a', '#6a8a4a', '#8a4a6a', '#4a7a7a', '#7a6a4a'];
      var categoryColors = {};
      var paletteIndex = 0;

      function slugify(str) {
        return (str || '')
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/[-\s]+/g, '-')
          .trim();
      }

      function getColor(slug) {
        if (!categoryColors[slug]) {
          categoryColors[slug] = PALETTE[paletteIndex % PALETTE.length];
          paletteIndex++;
        }
        return categoryColors[slug];
      }

      function getVisible() {
        var lista;
        if (currentMode === 'leidos') {
          lista = allLibros.filter(function (l) { return l.leido; });
          lista.sort(function (a, b) {
            if (b.ratingNum !== a.ratingNum) return b.ratingNum - a.ratingNum;
            return a.titulo.localeCompare(b.titulo, 'es');
          });
          if (currentFilter !== 'all') {
            lista = lista.filter(function (l) { return slugify(l.etiqueta) === currentFilter; });
          }
        } else if (currentMode === 'leyendo') {
          lista = allLibros.filter(function (l) { return l.actual; });
        } else {
          // pendientes: no leído y no leyendo
          lista = allLibros.filter(function (l) { return !l.leido && !l.actual; });
        }
        return lista;
      }

      function renderLibro(libro) {
        var cat   = slugify(libro.etiqueta);
        var color = getColor(cat || 'sin-categoria');
        var badge = libro.etiqueta
          ? '<span class="book-category" style="color:' + color + ';">' + libro.etiqueta.toUpperCase() + '</span>'
          : '';
        var preview = (libro.resena || '').split('\n\n')[0] || '';
        var resena  = preview ? '<div class="book-review">' + preview + '</div>' : '';
        var hint    = libro.leido ? '<span class="book-card-hint">Ver reseña →</span>' : '';
        var clickable = libro.leido ? ' book-card--clickable' : '';
        var hasCover = libro.portada ? ' book-card--has-cover' : '';
        var coverHtml = libro.portada
          ? '<img class="book-cover-img" src="' + libro.portada + '" alt="' + libro.titulo + '" loading="lazy" />'
          : '';

        return '<div class="book-card' + clickable + hasCover + '"'
          + ' data-id="' + libro.id + '"'
          + ' data-category="' + cat + '"'
          + ' style="border-left-color:' + color + ';">'
          + coverHtml
          + '<div class="book-title">' + libro.titulo + '</div>'
          + '<div class="book-author">' + libro.autor + '</div>'
          + '<div class="book-rating">' + (libro.puntuacion || '') + '</div>'
          + resena
          + '<div class="book-footer">' + badge + hint + '</div>'
          + '</div>';
      }

      function renderAll() {
        var visible   = getVisible();
        var container = document.getElementById('libros-container');
        if (visible.length === 0) {
          container.innerHTML = '<p class="biblioteca-empty">Sin libros por el momento.</p>';
          return;
        }
        container.innerHTML = visible.map(renderLibro).join('');
        if (currentMode === 'leidos' || currentMode === 'leyendo') {
          container.querySelectorAll('.book-card--clickable').forEach(function (card) {
            card.addEventListener('click', function () {
              var libro = allLibros.find(function (l) { return l.id === card.dataset.id; });
              if (libro) openBookModal(libro);
            });
          });
        }
      }

      function buildCategoryBar(libros) {
        var leidos = libros.filter(function (l) { return l.leido; });
        var seen   = {};
        var bar    = document.getElementById('category-bar');
        bar.querySelectorAll('.cat-pill:not([data-filter="all"])').forEach(function (el) { el.remove(); });

        leidos.forEach(function (l) {
          var slug = slugify(l.etiqueta);
          if (l.etiqueta && !seen[slug]) {
            seen[slug] = true;
            var btn = document.createElement('button');
            btn.className = 'cat-pill';
            btn.dataset.filter = slug;
            btn.textContent = l.etiqueta.toUpperCase();
            bar.appendChild(btn);
          }
        });

        bar.querySelectorAll('.cat-pill').forEach(function (pill) {
          pill.addEventListener('click', function () {
            bar.querySelectorAll('.cat-pill').forEach(function (p) { p.classList.remove('active'); });
            pill.classList.add('active');
            currentFilter = pill.dataset.filter;
            renderAll();
          });
        });
      }

      function openBookModal(libro) {
        var color = getColor(slugify(libro.etiqueta) || 'sin-categoria');
        document.getElementById('bm-rating').innerHTML = libro.puntuacion || '';
        document.getElementById('bm-title').textContent = libro.titulo;
        document.getElementById('bm-author').textContent = libro.autor;
        var catEl = document.getElementById('bm-category');
        catEl.textContent = libro.etiqueta ? libro.etiqueta.toUpperCase() : '';
        catEl.style.color = color;
        var parrafos = (libro.resena || 'Sin reseña.')
          .split('\n\n').filter(Boolean)
          .map(function (p) { return '<p>' + p.replace(/\n/g, '<br>') + '</p>'; })
          .join('');
        document.getElementById('bm-review').innerHTML = parrafos;
        document.getElementById('book-modal-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeBookModal() {
        document.getElementById('book-modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
      }

      // Modal handlers
      var overlay = document.getElementById('book-modal-overlay');
      document.getElementById('book-modal-close').addEventListener('click', closeBookModal);
      overlay.addEventListener('click', function (e) { if (e.target === overlay) closeBookModal(); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && overlay.classList.contains('open')) closeBookModal();
      });

      // Mode bar (LEÍDOS / PENDIENTES)
      document.getElementById('mode-bar').querySelectorAll('.mode-pill').forEach(function (pill) {
        pill.addEventListener('click', function () {
          document.getElementById('mode-bar').querySelectorAll('.mode-pill')
            .forEach(function (p) { p.classList.remove('active'); });
          pill.classList.add('active');
          currentMode   = pill.dataset.mode;
          currentFilter = 'all';
          // Reset cat-pill
          document.getElementById('category-bar').querySelectorAll('.cat-pill')
            .forEach(function (p) { p.classList.remove('active'); });
          document.querySelector('#category-bar [data-filter="all"]').classList.add('active');
          // Mostrar/ocultar filtro de categoría
          // Categoría solo visible en LEÍDOS
          document.getElementById('category-bar').style.display =
            currentMode === 'leidos' ? '' : 'none';
          renderAll();
        });
      });

      // Cargar datos
      fetch('/api/biblioteca')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var container = document.getElementById('libros-container');
          if (data.error) {
            container.innerHTML = '<p class="biblioteca-error">No se pudo cargar la biblioteca.</p>';
            return;
          }
          if (!data.libros || data.libros.length === 0) {
            container.innerHTML = '<p class="biblioteca-empty">Sin libros por el momento.</p>';
            return;
          }
          allLibros = data.libros;
          allLibros.forEach(function (l) { getColor(slugify(l.etiqueta) || 'sin-categoria'); });
          buildCategoryBar(allLibros);
          renderAll();
        })
        .catch(function () {
          document.getElementById('libros-container').innerHTML =
            '<p class="biblioteca-error">No se pudo cargar la biblioteca.</p>';
        });
    })();
  </script>
</body>
</html>
