<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escritura — Facundo Balbo</title>
  <meta name="description" content="Ensayos sobre permanencia. Reflexiones en la intersección de la lógica estructural y la experiencia humana." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.85em' x='15' font-size='90' font-family='Georgia' font-style='italic' fill='%23c8956c'>F</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .essays-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 32px;
    }
    @media (max-width: 900px) {
      .essays-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .essays-grid { grid-template-columns: 1fr; }
    }
    .essay-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .essay-card:hover {
      border-color: var(--accent);
    }
    .essay-card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .essay-card-body {
      padding: 14px 16px;
    }
    .essay-card-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .essay-card-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-style: italic;
      color: var(--text);
      margin-top: 6px;
      line-height: 1.3;
    }
    /* Estilos del modal ahora en css/styles.css */
  </style>
</head>
<body data-page="escritura">
  <div id="sidebar"></div>

  <div class="mobile-topbar" id="mobile-topbar"></div>

  <main class="main-content" id="main-content">
    <div class="content-wrapper">

      <!-- HEADER -->
      <div class="escritura-header-grid">
        <header class="section-header" style="margin-bottom: 0;">
          <span class="eyebrow">ESCRITURA</span>
          <h1 class="section-title">Notas y ensayos en progreso.</h1>
          <p>Lo que voy escribiendo, en bruto. Algunas cosas terminan en algún lado, otras se quedan acá.</p>
        </header>
        <div class="escritura-meta-card">
          <span class="escritura-meta-label">COLECCIÓN</span>
          <div>009</div>
          <span class="escritura-meta-label" style="margin-top: 12px;">ÚLTIMO INGRESO</span>
          <div>2026</div>
          <span class="escritura-meta-label" style="margin-top: 12px;">ESTADO</span>
          <div><span class="badge badge--live">INVESTIGACIÓN ACTIVA</span></div>
        </div>
      </div>

      <hr class="divider" />

      <!-- ESSAYS — cargado dinámicamente desde /api/escritura -->
      <section>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 24px; flex-wrap:wrap; gap:12px;">
          <p class="eyebrow" style="margin:0; display:block;">ESCRITOS</p>
          <div class="filter-bar" id="essay-filter-bar" style="margin-bottom:0;">
            <button class="filter-pill" data-estado="all">TODOS</button>
            <button class="filter-pill active" data-estado="finalizado">FINALIZADO</button>
            <button class="filter-pill" data-estado="en-progreso">EN PROGRESO</button>
          </div>
        </div>
        <div class="essays-grid" id="essays-container">
          <p class="biblioteca-loading">Cargando...</p>
        </div>
      </section>

    </div>

    <footer>
      <span>© 2026 — Facundo Balbo</span>
      <span class="footer-meta" id="footer-status"></span>
    </footer>
  </main>

  <!-- ESSAY MODAL -->
  <div class="essay-modal-overlay" id="essay-modal-overlay">
    <div class="essay-modal">
      <div class="essay-modal-label" id="essay-modal-label"></div>
      <div class="essay-modal-title" id="essay-modal-title"></div>
      <div class="essay-modal-body" id="essay-modal-body"></div>
      <button class="essay-modal-close" id="essay-modal-close">CERRAR ✕</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    (function () {
      var allEscritos = [];

      function slugEstado(estado) {
        return (estado || '').toLowerCase().replace(/\s+/g, '-');
      }

      function renderEscrito(escrito, index) {
        var estadoSlug = slugEstado(escrito.estado);
        var estadoLabel = escrito.estado
          ? `<span class="essay-estado essay-estado--${estadoSlug}">${escrito.estado.toUpperCase()}</span>`
          : '';

        var coverHtml = escrito.cover
          ? `<img class="essay-card-image" src="${escrito.cover}" alt="${escrito.titulo}" loading="lazy" />`
          : `<div class="essay-card-image essay-card-image--fallback" aria-hidden="true"></div>`;

        return `
          <div class="essay-card" data-estado="${estadoSlug}" data-idx="${index}">
            ${coverHtml}
            <div class="essay-card-body">
              <div class="essay-card-label">${estadoLabel}</div>
              <div class="essay-card-title">${escrito.titulo}</div>
            </div>
          </div>`;
      }

      function openModal(escrito) {
        var overlay = document.getElementById('essay-modal-overlay');
        document.getElementById('essay-modal-label').textContent = escrito.estado || 'ENSAYO';
        document.getElementById('essay-modal-title').textContent = escrito.titulo;

        document.getElementById('essay-modal-body').innerHTML = escrito.contenido || '<p>Sin contenido.</p>';

        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        document.getElementById('essay-modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
      }

      function attachCardListeners() {
        document.querySelectorAll('.essay-card').forEach(function (card) {
          card.addEventListener('click', function () {
            var idx = parseInt(card.dataset.idx, 10);
            openModal(allEscritos[idx]);
          });
        });
      }

      function initFilter() {
        document.querySelectorAll('#essay-filter-bar .filter-pill').forEach(function (pill) {
          pill.addEventListener('click', function () {
            document.querySelectorAll('#essay-filter-bar .filter-pill').forEach(function (p) {
              p.classList.remove('active');
            });
            pill.classList.add('active');
            var estado = pill.dataset.estado;
            document.querySelectorAll('.essay-card').forEach(function (card) {
              if (estado === 'all') {
                card.classList.remove('hidden');
              } else {
                card.classList.toggle('hidden', card.dataset.estado !== estado);
              }
            });
          });
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        var overlay = document.getElementById('essay-modal-overlay');
        document.getElementById('essay-modal-close').addEventListener('click', closeModal);
        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) closeModal();
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
        });

        initFilter();

        fetch('/api/escritura')
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var container = document.getElementById('essays-container');
            if (data.error || !data.escritos) {
              container.innerHTML = '<p class="biblioteca-error">No se pudieron cargar los escritos.</p>';
              return;
            }
            if (data.escritos.length === 0) {
              container.innerHTML = '<p class="biblioteca-empty">Sin escritos por el momento.</p>';
              return;
            }
            allEscritos = data.escritos;
            container.innerHTML = allEscritos.map(renderEscrito).join('');
            attachCardListeners();
            // Aplicar filtro inicial: mostrar solo finalizados
            document.querySelectorAll('.essay-card').forEach(function (card) {
              card.classList.toggle('hidden', card.dataset.estado !== 'finalizado');
            });
          })
          .catch(function () {
            document.getElementById('essays-container').innerHTML =
              '<p class="biblioteca-error">No se pudieron cargar los escritos.</p>';
          });
      });
    })();
  </script>
</body>
</html>
